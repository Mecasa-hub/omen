  <text x="35" y="85" fill="#9CA3AF" font-family="Arial,sans-serif" font-size="11">CONSENSUS METER</text>

  <!-- Green (YES) bar -->
  <rect x="35" y="92" width="490" height="20" rx="4" fill="#10B981" opacity="0.9"/>
  <text x="45" y="106" fill="white" font-family="Arial,sans-serif" font-size="12" font-weight="bold">YES — 687 agents (57.3%)</text>

  <!-- Red (NO) bar -->
