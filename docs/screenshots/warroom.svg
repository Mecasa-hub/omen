  <rect x="635" y="300" width="235" height="30" rx="6" fill="#1e1535"/>
  <circle cx="655" cy="315" r="8" fill="#10B981"/>
  <text x="670" y="320" fill="#D1D5DB" font-family="Arial,sans-serif" font-size="12">Bull Analysts</text>
  <text x="810" y="320" fill="#10B981" font-family="Arial,sans-serif" font-size="12" font-weight="bold">412</text>

  <rect x="635" y="335" width="235" height="30" rx="6" fill="#1e1535"/>
  <circle cx="655" cy="350" r="8" fill="#EF4444"/>
  <text x="670" y="355" fill="#D1D5DB" font-family="Arial,sans-serif" font-size="12">Bear Analysts</text>
  <text x="810" y="355" fill="#EF4444" font-family="Arial,sans-serif" font-size="12" font-weight="bold">298</text>

  <rect x="635" y="370" width="235" height="30" rx="6" fill="#1e1535"/>
  <circle cx="655" cy="385" r="8" fill="#3B82F6"/>
  <text x="670" y="390" fill="#D1D5DB" font-family="Arial,sans-serif" font-size="12">Statisticians</text>
  <text x="810" y="390" fill="#3B82F6" font-family="Arial,sans-serif" font-size="12" font-weight="bold">275</text>

  <rect x="635" y="405" width="235" height="30" rx="6" fill="#1e1535"/>
  <circle cx="655" cy="420" r="8" fill="#F59E0B"/>
  <text x="670" y="425" fill="#D1D5DB" font-family="Arial,sans-serif" font-size="12">Contrarians</text>
  <text x="810" y="425" fill="#F59E0B" font-family="Arial,sans-serif" font-size="12" font-weight="bold">215</text>

  <rect x="635" y="440" width="235" height="30" rx="6" fill="#1e1535"/>
  <circle cx="655" cy="455" r="8" fill="#8B5CF6"/>
  <text x="670" y="460" fill="#D1D5DB" font-family="Arial,sans-serif" font-size="12">Historians</text>
  <text x="810" y="460" fill="#8B5CF6" font-family="Arial,sans-serif" font-size="12" font-weight="bold">47</text>

  <!-- Whale tracker -->
  <text x="635" y="500" fill="#A78BFA" font-family="Arial,sans-serif" font-size="12" font-weight="bold">&#x1F40B; WHALE TRACKER</text>

  <rect x="635" y="510" width="235" height="28" rx="6" fill="#1e1535"/>
  <text x="650" y="529" fill="#10B981" font-family="Arial,sans-serif" font-size="11">&#x2705; @0p0jogggg — BUY $181</text>

  <rect x="635" y="543" width="235" height="28" rx="6" fill="#1e1535"/>
  <text x="650" y="562" fill="#10B981" font-family="Arial,sans-serif" font-size="11">&#x2705; @Sharky6999 — BUY $95</text>

  <rect x="635" y="576" width="235" height="28" rx="6" fill="#1e1535"/>
  <text x="650" y="595" fill="#10B981" font-family="Arial,sans-serif" font-size="11">&#x2705; @WhalePanda — BUY $340</text>

  <rect x="635" y="609" width="235" height="28" rx="6" fill="#1e1535"/>
  <text x="650" y="628" fill="#EF4444" font-family="Arial,sans-serif" font-size="11">&#x274C; @CryptoKing — SELL $50</text>

  <rect x="635" y="642" width="235" height="28" rx="6" fill="#1e1535"/>
  <text x="650" y="661" fill="#6B7280" font-family="Arial,sans-serif" font-size="11">&#x23F3; @BigMoney — No position yet</text>

</svg>