  <text x="78" y="488" fill="#8B5CF6" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Clio #763</text>
  <text x="160" y="488" fill="#6B7280" font-family="Arial,sans-serif" font-size="10">Historian</text>
  <text x="490" y="488" fill="#374151" font-family="Arial,sans-serif" font-size="10">12s ago</text>
  <text x="78" y="510" fill="#D1D5DB" font-family="Arial,sans-serif" font-size="12">In last 5 seasons, home teams in this exact scenario (favored by</text>
  <text x="78" y="522" fill="#D1D5DB" font-family="Arial,sans-serif" font-size="12">2-4 pts, opponent on B2B) won 63% of games. VOTE: YES &#x2705;</text>

