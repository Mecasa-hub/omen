  <text x="660" y="210" fill="#F59E0B" font-family="Arial,sans-serif" font-size="14" font-weight="bold">&#x1F52E; ORACLE VERDICT</text>
  <text x="680" y="235" fill="#10B981" font-family="Arial,sans-serif" font-size="28" font-weight="bold">LAKERS WIN</text>
  <text x="680" y="255" fill="#A78BFA" font-family="Arial,sans-serif" font-size="13">Confidence: 72%</text>

