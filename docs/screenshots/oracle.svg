<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0F0A1A"/><stop offset="100%" stop-color="#1a1030"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e1535"/><stop offset="100%" stop-color="#150f28"/></linearGradient>
    <linearGradient id="verdict" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#F59E0B"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect x="0" y="0" width="180" height="500" fill="#120D20"/>
  <text x="90" y="35" fill="#7C3AED" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">🔮 OMEN</text>
  <text x="90" y="76" fill="#6B7280" font-family="Arial" font-size="13" text-anchor="middle">📊 Dashboard</text>
  <rect x="15" y="90" width="150" height="32" rx="8" fill="#7C3AED" opacity="0.2"/>
  <text x="90" y="111" fill="#A78BFA" font-family="Arial" font-size="13" text-anchor="middle">🔮 Oracle</text>
  <text x="90" y="141" fill="#6B7280" font-family="Arial" font-size="13" text-anchor="middle">🐋 Whales</text>
  <text x="210" y="35" fill="white" font-family="Arial" font-size="16" font-weight="bold">Oracle Chamber</text>
  <!-- Chat Area -->
  <rect x="200" y="50" width="420" height="440" rx="10" fill="url(#card)" stroke="#2D2150" stroke-width="1"/>
  <!-- User Message -->
  <rect x="320" y="65" width="280" height="35" rx="12" fill="#7C3AED" opacity="0.3"/>
  <text x="335" y="87" fill="white" font-family="Arial" font-size="12">Will the Lakers beat the Celtics tonight?</text>
  <!-- Agent Debates -->
  <rect x="220" y="115" width="380" height="45" rx="8" fill="#1a1535" stroke="#2D2150" stroke-width="1"/>
  <circle cx="240" cy="137" r="12" fill="#10B981"/>
  <text x="240" y="141" fill="white" font-family="Arial" font-size="9" text-anchor="middle">A</text>
  <text x="260" y="130" fill="#10B981" font-family="Arial" font-size="10" font-weight="bold">Atlas (Bull)</text>
  <text x="260" y="148" fill="#9CA3AF" font-family="Arial" font-size="10">"LeBron's injury report says probable. Lakers 58%..."</text>
  <rect x="220" y="170" width="380" height="45" rx="8" fill="#1a1535" stroke="#2D2150" stroke-width="1"/>
  <circle cx="240" cy="192" r="12" fill="#EF4444"/>
  <text x="240" y="196" fill="white" font-family="Arial" font-size="9" text-anchor="middle">N</text>
  <text x="260" y="185" fill="#EF4444" font-family="Arial" font-size="10" font-weight="bold">Nemesis (Bear)</text>
  <text x="260" y="203" fill="#9CA3AF" font-family="Arial" font-size="10">"Celtics are 7-1 on back-to-backs. Don't ignore..."</text>
  <rect x="220" y="225" width="380" height="45" rx="8" fill="#1a1535" stroke="#2D2150" stroke-width="1"/>
  <circle cx="240" cy="247" r="12" fill="#3B82F6"/>
  <text x="240" y="251" fill="white" font-family="Arial" font-size="9" text-anchor="middle">Q</text>
  <text x="260" y="240" fill="#3B82F6" font-family="Arial" font-size="10" font-weight="bold">Quant (Analyst)</text>
  <text x="260" y="258" fill="#9CA3AF" font-family="Arial" font-size="10">"Statistical model: Lakers 61.3% home advantage..."</text>
  <!-- Verdict Box -->
  <rect x="220" y="285" width="380" height="80" rx="10" fill="#1a1030" stroke="url(#verdict)" stroke-width="2"/>
  <text x="410" y="310" fill="#F59E0B" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">🔮 ORACLE VERDICT</text>
  <text x="410" y="335" fill="white" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">LAKERS WIN — 72% Confidence</text>
  <text x="410" y="355" fill="#10B981" font-family="Arial" font-size="11" text-anchor="middle">🐋 Whale Agreement: 3/5 whales confirm | Swarm: 847/1200 agents</text>
  <!-- Bet Button -->
  <rect x="280" y="380" width="260" height="40" rx="20" fill="#7C3AED"/>
  <text x="410" y="405" fill="white" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">🎯 Bet $5 with the Oracle</text>
  <text x="410" y="440" fill="#6B7280" font-family="Arial" font-size="11" text-anchor="middle">💰 1 credit used | Credits remaining: 47</text>
  <!-- Input -->
  <rect x="220" y="455" width="320" height="28" rx="14" fill="#1a1535" stroke="#2D2150" stroke-width="1"/>
  <text x="235" y="473" fill="#6B7280" font-family="Arial" font-size="11">Ask the Oracle anything...</text>
  <rect x="545" y="455" width="55" height="28" rx="14" fill="#7C3AED"/>
  <text x="573" y="473" fill="white" font-family="Arial" font-size="11" text-anchor="middle">Ask</text>
  <!-- Right Panel - War Room -->
  <rect x="635" y="50" width="155" height="440" rx="10" fill="url(#card)" stroke="#2D2150" stroke-width="1"/>
  <text x="712" y="75" fill="#F59E0B" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">⚔️ War Room</text>
  <text x="650" y="100" fill="#9CA3AF" font-family="Arial" font-size="10">Agent Vote Tally:</text>
  <rect x="650" y="110" width="120" height="12" rx="6" fill="#1a1535"/>
  <rect x="650" y="110" width="85" height="12" rx="6" fill="#10B981"/>
  <text x="650" y="138" fill="#10B981" font-family="Arial" font-size="10">Bulls: 847 (71%)</text>
  <text x="650" y="155" fill="#EF4444" font-family="Arial" font-size="10">Bears: 353 (29%)</text>
  <line x1="650" y1="170" x2="770" y2="170" stroke="#2D2150" stroke-width="1"/>
  <text x="650" y="190" fill="#9CA3AF" font-family="Arial" font-size="10">🐋 Whale Signals:</text>
  <text x="650" y="210" fill="#10B981" font-family="Arial" font-size="10">@0p0jogggg: BUY ✅</text>
  <text x="650" y="228" fill="#10B981" font-family="Arial" font-size="10">@Sharky: BUY ✅</text>
  <text x="650" y="246" fill="#EF4444" font-family="Arial" font-size="10">@CryptoK: SELL ❌</text>
  <line x1="650" y1="260" x2="770" y2="260" stroke="#2D2150" stroke-width="1"/>
  <text x="650" y="280" fill="#9CA3AF" font-family="Arial" font-size="10">📊 Oracle Stats:</text>
  <text x="650" y="300" fill="white" font-family="Arial" font-size="10">Accuracy: 71.2%</text>
  <text x="650" y="318" fill="white" font-family="Arial" font-size="10">Streak: 🔥 12 wins</text>
  <text x="650" y="336" fill="white" font-family="Arial" font-size="10">Today: 8/11 correct</text>
</svg>
