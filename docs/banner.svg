<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <rect width="1280" height="640" fill="#000000"/>

  <!-- Subtle radial glow behind logo -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="640" cy="280" rx="400" ry="200" fill="url(#glow)"/>

  <!-- Inverted Ohm symbol ℧ -->
  <text x="640" y="290" text-anchor="middle" 
        font-family="Georgia, serif" font-size="180" font-weight="400" 
        fill="#ffffff" letter-spacing="0">℧</text>

  <!-- OMEN text -->
  <text x="640" y="400" text-anchor="middle" 
        font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" 
        font-size="90" font-weight="700" fill="#ffffff" 
        letter-spacing="20">OMEN</text>

  <!-- Tagline -->
  <text x="640" y="460" text-anchor="middle" 
        font-family="'JetBrains Mono', monospace" 
        font-size="22" font-weight="400" fill="#666666" 
        letter-spacing="8">ORACLE MACHINE · 45 AI AGENTS</text>

  <!-- Thin line separator -->
  <line x1="520" y1="420" x2="760" y2="420" stroke="#333333" stroke-width="1"/>

  <!-- Bottom links -->
  <text x="640" y="580" text-anchor="middle" 
        font-family="'JetBrains Mono', monospace" 
        font-size="16" fill="#444444" letter-spacing="4">
    PREDICTION ENGINE · SWARM INTELLIGENCE · POLYMARKET
  </text>
</svg>