<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0A1A"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="consensus" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="57%" stop-color="#10B981"/>
      <stop offset="57%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="60" fill="#1e1535" opacity="0.9"/>
  <text x="20" y="38" fill="#F59E0B" font-family="Arial,sans-serif" font-size="22" font-weight="bold">&#x2694;&#xFE0F; WAR ROOM</text>
  <text x="170" y="38" fill="#9CA3AF" font-family="Arial,sans-serif" font-size="14">Will the Lakers beat the Celtics tonight?</text>

  <!-- Live indicator -->
  <circle cx="820" cy="30" r="6" fill="#EF4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="832" y="35" fill="#EF4444" font-family="Arial,sans-serif" font-size="12" font-weight="bold">LIVE</text>

  <!-- Agent count -->
  <text x="700" y="35" fill="#A78BFA" font-family="Arial,sans-serif" font-size="13">1,247 agents online</text>

  <!-- Vote Bar -->
