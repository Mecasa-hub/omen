  <text x="78" y="445" fill="#D1D5DB" font-family="Arial,sans-serif" font-size="12">Everyone is on Lakers. When 70%+ of bets go one way, fade it.</text>
  <text x="78" y="457" fill="#D1D5DB" font-family="Arial,sans-serif" font-size="12">Public bias is a losing signal historically (-3.2% ROI). VOTE: NO &#x274C;</text>

